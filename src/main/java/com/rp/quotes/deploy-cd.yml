name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin main
            # We use -DskipTests because tests already ran in the CI pipeline during the PR phase.
            # Re-running them on the Free Tier t2.micro wastes CPU/RAM!
            mvn clean package -DskipTests
            
            # Restart the service to pick up the newly built JAR
            sudo systemctl restart quotes-api.service
            # Output the status so we can see it in the GitHub Actions logs
            sudo systemctl status quotes-api.service --no-pager